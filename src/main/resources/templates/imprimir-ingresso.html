<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ingresso Confirmado</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>Ingresso Confirmado</h1>

    <div class="card" th:if="${ingresso != null}">
        <h2>Comprovante do Ingresso</h2>
        <p><strong>Evento:</strong> <span th:text="${ingresso.nomeEvento}"></span></p>
        <p><strong>Cliente:</strong> <span th:text="${ingresso.nomeCliente}"></span></p>
        <p><strong>Data:</strong> <span th:text="${ingresso.dataEvento}"></span></p>
        <p><strong>Local:</strong> <span th:text="${ingresso.localEvento}"></span></p>
        <p><strong>Tipo:</strong> <span th:text="${ingresso.tipoIngresso}"></span></p>
        <p><strong>Valor Final:</strong> R$ <span th:text="${ingresso.valorFinal}"></span></p>
        <p><strong>Estado:</strong> <span th:text="${ingresso.estado}"></span></p>
        <p><strong>Codigo:</strong> <span class="code" th:text="${ingresso.codigoQr}"></span></p>

        <img class="qr-code" th:if="${ingresso.codigoQr != null}" th:src="@{/ingressos/qrcode/{id}(id=${ingresso.id})}" alt="QR Code">

        <hr>
        <h3>Ingresso:</h3>
        <p th:text="${ingresso.imprimirIngresso}"></p>

        <button class="btn" onclick="window.print()">Imprimir</button>
    </div>

    <div th:if="${ingresso == null}">
        <p class="erro">Ingresso nao encontrado.</p>
    </div>

    <br>
    <a href="/ingressos" class="btn">Meus Ingressos</a>
    <a href="/eventos" class="btn">Reservar outro</a>
</div>
</body>
</html>
