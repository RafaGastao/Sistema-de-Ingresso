<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ingressos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container wide">
    <h1>Ingressos</h1>

    <div class="top-actions">
        <a href="/eventos" class="btn">Reservar novo ingresso</a>
        <a href="/cliente" class="btn">Area do cliente</a>
        <a href="/admin" class="btn" th:if="${session.perfilUsuario == 'ADMIN'}">Painel admin</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>Evento</th>
            <th>Cliente</th>
            <th>Tipo</th>
            <th>Valor Final</th>
            <th>Estado</th>
            <th>QR Code</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ingresso : ${ingressos}">
            <td th:text="${ingresso.nomeEvento}"></td>
            <td th:text="${ingresso.nomeCliente}"></td>
            <td th:text="${ingresso.tipoIngresso}"></td>
            <td th:text="${'R$ ' + ingresso.valorFinal}"></td>
            <td th:text="${ingresso.estado}"></td>
            <td>
                <img class="qr-small" th:if="${ingresso.codigoQr != null}" th:src="@{/ingressos/qrcode/{id}(id=${ingresso.id})}" alt="QR Code">
            </td>
            <td class="actions">
                <a th:href="@{/ingressos/{id}(id=${ingresso.id})}" class="btn">Detalhes</a>
                <a th:href="@{/ingressos/pagar/{id}(id=${ingresso.id})}" class="btn"
                   th:if="${ingresso.estado.name() == 'RESERVADO'}">Pagar</a>
                <a th:href="@{/ingressos/cancelar/{id}(id=${ingresso.id})}" class="btn"
                   th:if="${ingresso.estado.name() == 'RESERVADO' || ingresso.estado.name() == 'CONFIRMADO' || ingresso.estado.name() == 'PAGO'}">Cancelar</a>
                <a th:href="@{/ingressos/deletar/{id}(id=${ingresso.id})}" class="btn btn-danger"
                   th:if="${session.perfilUsuario == 'ADMIN'}">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
