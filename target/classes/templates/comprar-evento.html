<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Comprar Ingresso</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <h1>Comprar Ingresso</h1>

    <div class="card" th:if="${evento != null}">
        <h2 th:text="${evento.nome}"></h2>
        <p><strong>Data:</strong> <span th:text="${evento.data}"></span></p>
        <p><strong>Local:</strong> <span th:text="${evento.local}"></span></p>
        <p><strong>Valor Base:</strong> R$ <span id="valorBase" th:text="${evento.valorBase}"></span></p>
    </div>

    <form action="/ingressos/salvar" method="post" th:if="${evento != null}">
        <input type="hidden" name="nomeEvento" th:value="${evento.nome}">
        <input type="hidden" name="dataEvento" th:value="${evento.data}">
        <input type="hidden" name="valorBase" th:value="${evento.valorBase}">

        <!-- Agora o cliente será o usuário logado -->
        <input type="hidden" name="nomeCliente" th:value="${session.nomeUsuario}">

        <label>Tipo de ingresso:</label>
        <select name="tipo" id="tipoIngresso" required>
            <option value="NORMAL">Normal</option>
            <option value="VIP">VIP</option>
            <option value="MEIA">Meia-entrada</option>
        </select>

        <div class="card">
            <h3>Valor final:</h3>
            <p id="valorFinal"></p>
        </div>

        <button class="btn" type="submit">Confirmar compra</button>
    </form>

    <div th:if="${evento == null}">
        <p class="erro">Evento não encontrado.</p>
    </div>

    <br>

    <a href="/eventos" class="btn">Voltar</a>
</div>

<script th:inline="javascript">
    const valorBase = Number([[${evento != null ? evento.valorBase : 0}]]);
    const tipo = document.getElementById("tipoIngresso");
    const valorFinal = document.getElementById("valorFinal");

    function calcularValor() {
        if (!tipo || !valorFinal) return;

        let valor = valorBase;

        if (tipo.value === "VIP") {
            valor = valorBase * 1.5;
        } else if (tipo.value === "MEIA") {
            valor = valorBase / 2;
        }

        valorFinal.innerText = "R$ " + valor.toFixed(2);
    }

    if (tipo) {
        tipo.addEventListener("change", calcularValor);
        calcularValor();
    }
</script>

</body>
</html>
