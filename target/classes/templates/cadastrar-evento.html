<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Evento</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <h1>Cadastrar Evento</h1>

    <form action="/admin/salvar" method="post">
        <label>Nome do evento:</label>
        <input type="text" name="nome" required>

        <label>Descricao:</label>
        <textarea name="descricao" rows="4" required></textarea>

        <label>Data:</label>
        <input type="date" name="data" required>

        <label>Horario:</label>
        <input type="time" name="horario" required>

        <label>Local:</label>
        <input type="text" name="local" required>

        <label>Ingressos disponiveis:</label>
        <input type="number" name="quantidadeIngressosDisponiveis" min="0" required>

        <label>Valor base:</label>
        <input type="number" name="valorBase" step="0.01" min="0" required>

        <button class="btn" type="submit">Salvar Evento</button>
    </form>

    <br>
    <a href="/admin" class="btn">Voltar</a>
</div>
</body>
</html>
